<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — WPC Banding System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">

  <div class="w-full max-w-sm px-4">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold">WPC Banding System</h1>
      <p class="text-slate-400 text-sm mt-1">Administrator Login</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">

      {% if form.errors %}
      <div class="mb-5 px-4 py-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <!-- Username -->
        <div class="mb-5">
          <label for="id_username" class="block text-sm font-medium text-slate-300 mb-2">
            Username
          </label>
          <input type="text"
                 name="username"
                 id="id_username"
                 autocomplete="username"
                 autofocus
                 required
                 class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 text-white rounded-lg text-sm
                        placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="Enter your username" />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label for="id_password" class="block text-sm font-medium text-slate-300 mb-2">
            Password
          </label>
          <input type="password"
                 name="password"
                 id="id_password"
                 autocomplete="current-password"
                 required
                 class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 text-white rounded-lg text-sm
                        placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                 placeholder="Enter your password" />
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg text-sm transition-colors">
          Sign In
        </button>
      </form>

    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      Authorized personnel only
    </p>

  </div>

</body>
</html>
